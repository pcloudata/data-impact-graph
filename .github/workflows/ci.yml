name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run demo query pack
        run: python scripts/demo_queries.py

      - name: Run extractor stubs
        run: |
          python -m extractors.snowflake --pretty
          python -m extractors.powerbi --pretty

      - name: Merge Snowflake extract into graph
        run: python scripts/merge_snowflake_extract.py --empty --pretty

      - name: Pytest smoke suite
        run: pytest -q
